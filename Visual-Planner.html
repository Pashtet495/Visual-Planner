<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Визуальный Планировщик</title>
<style>
:root {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-tertiary: #0f3460;
  --bg-input: #1a1a2e;
  --border-color: #0f3460;
  --border-hover: #1a4a8a;
  --text-primary: #e0e0e0;
  --text-secondary: #aaa;
  --text-muted: #666;
  --accent: #8ab4f8;
  --accent-bg: #1a4a8a;
  --accent-bg-hover: #2a5a9a;
  --node-fill: #16213e;
  --node-stroke: #5a6a8a;
  --edge-color: #5a6a8a;
  --edge-hover: #8ab4f8;
  --subgraph-fill: #16213e;
  --subgraph-stroke: #0f3460;
  --scrollbar-track: #1a1a2e;
  --scrollbar-thumb: #0f3460;
  --scrollbar-thumb-hover: #1a4a8a;
  --shadow: rgba(0,0,0,0.5);
  --popup-bg: #1e2a4a;
  --ctx-bg: #1e2a4a;
  --modal-bg: #1e2a4a;
  --gantt-bar-from: #0f3460;
  --gantt-bar-to: #1a4a8a;
  --gantt-bar-border: #2a5a9a;
  --gantt-grid: rgba(15,52,96,0.3);
  --gantt-row-alt: rgba(26,26,46,0.3);
  --gantt-selected: rgba(26,74,138,0.4);
  --gantt-linked: rgba(26,74,138,0.15);
  --info-btn-bg: #0f3460;
  --info-btn-stroke: #2a5a9a;
  --port-bg: #0f3460;
  --port-stroke: #2a5a9a;
  --collapse-bg: #0f3460;
  --collapse-stroke: #2a5a9a;
  --label-bg: #16213e;
  --label-stroke: #0f3460;
  --todo-done: #6bcb77;
  --todo-pending: #ff6b6b;
  --highlight-glow: drop-shadow(0 0 6px var(--accent));
}

[data-theme="light"] {
  --bg-primary: #f0f2f5;
  --bg-secondary: #ffffff;
  --bg-tertiary: #e8ecf1;
  --bg-input: #ffffff;
  --border-color: #d0d5dd;
  --border-hover: #98a2b3;
  --text-primary: #1d2939;
  --text-secondary: #475467;
  --text-muted: #98a2b3;
  --accent: #2e6fd9;
  --accent-bg: #d4e4ff;
  --accent-bg-hover: #b8d4ff;
  --node-fill: #ffffff;
  --node-stroke: #98a2b3;
  --edge-color: #98a2b3;
  --edge-hover: #2e6fd9;
  --subgraph-fill: #f8f9fb;
  --subgraph-stroke: #d0d5dd;
  --scrollbar-track: #f0f2f5;
  --scrollbar-thumb: #d0d5dd;
  --scrollbar-thumb-hover: #98a2b3;
  --shadow: rgba(0,0,0,0.15);
  --popup-bg: #ffffff;
  --ctx-bg: #ffffff;
  --modal-bg: #ffffff;
  --gantt-bar-from: #d4e4ff;
  --gantt-bar-to: #b8d4ff;
  --gantt-bar-border: #2e6fd9;
  --gantt-grid: rgba(208,213,221,0.4);
  --gantt-row-alt: rgba(240,242,245,0.5);
  --gantt-selected: rgba(46,111,217,0.15);
  --gantt-linked: rgba(46,111,217,0.08);
  --info-btn-bg: #e8ecf1;
  --info-btn-stroke: #98a2b3;
  --port-bg: #e8ecf1;
  --port-stroke: #98a2b3;
  --collapse-bg: #e8ecf1;
  --collapse-stroke: #98a2b3;
  --label-bg: #ffffff;
  --label-stroke: #d0d5dd;
  --todo-done: #16a34a;
  --todo-pending: #dc2626;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',Tahoma,sans-serif;font-size:13px;background:var(--bg-primary);color:var(--text-primary);}
#app{display:flex;flex-direction:column;height:100%;width:100%;}

/* HEADER */
#header{display:flex;align-items:center;background:var(--bg-secondary);padding:4px 8px;gap:6px;border-bottom:1px solid var(--border-color);min-height:40px;z-index:100;flex-shrink:0;}
#header button{background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-color);padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px;white-space:nowrap;}
#header button:hover{background:var(--accent-bg);border-color:var(--border-hover);}
#tabs-container{display:flex;gap:2px;align-items:center;overflow-x:auto;flex:1;}
.tab{background:var(--bg-tertiary);border:1px solid var(--border-color);padding:4px 10px;border-radius:4px 4px 0 0;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;white-space:nowrap;position:relative;color:var(--text-secondary);}
.tab.active{background:var(--accent-bg);color:var(--text-primary);border-bottom-color:var(--accent-bg);}
.tab .close-tab{margin-left:6px;font-size:14px;cursor:pointer;color:var(--text-muted);line-height:1;}
.tab .close-tab:hover{color:#ff4444;}
.tab .unsaved{color:#ff4444;font-weight:bold;margin-left:2px;}

/* THEME TOGGLE */
#theme-toggle{background:none;border:1px solid var(--border-color);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text-primary);}
#theme-toggle:hover{background:var(--accent-bg);}

/* MAIN AREA */
#main-area{display:flex;flex:1;overflow:hidden;position:relative;}

/* GRAPH AREA */
#graph-area{flex:1;position:relative;overflow:hidden;background:var(--bg-primary);cursor:default;}
#graph-svg{width:100%;height:100%;}
#graph-svg .node-group{cursor:grab;}
#graph-svg .node-group:active{cursor:grabbing;}
#graph-svg .edge-path{fill:none;stroke:var(--edge-color);stroke-width:2;pointer-events:stroke;transition:stroke 0.15s;}
#graph-svg .edge-path:hover{stroke:var(--edge-hover);stroke-width:3;}
#graph-svg .edge-hitarea{fill:none;stroke:transparent;stroke-width:15;pointer-events:stroke;cursor:pointer;}
#graph-svg .arrow-head{fill:var(--edge-color);}
#graph-svg .subgraph-rect{fill:var(--subgraph-fill);stroke:var(--subgraph-stroke);stroke-width:2;rx:8;ry:8;}
#graph-svg .subgraph-label{fill:var(--accent);font-size:13px;font-weight:bold;}
#graph-svg .collapse-btn{cursor:pointer;}
#graph-svg .collapse-btn:hover circle{fill:var(--accent-bg);}

/* NODE SHAPES */
.node-shape{fill:var(--node-fill);stroke:var(--node-stroke);stroke-width:2;transition:stroke 0.15s, filter 0.15s;}
.node-text{fill:var(--text-primary);font-size:12px;pointer-events:none;}
.node-group:hover .node-shape{stroke:var(--edge-hover);}
.node-group.selected .node-shape{stroke:var(--accent);stroke-width:3;filter:drop-shadow(0 0 4px var(--accent));}
.node-group.multi-selected .node-shape{stroke:var(--accent);stroke-width:3;stroke-dasharray:6,3;filter:drop-shadow(0 0 4px var(--accent));}
.node-group.highlight-0 .node-shape{stroke:#ff6b6b;stroke-width:3;filter:drop-shadow(0 0 6px #ff6b6b);}
.node-group.highlight-1 .node-shape{stroke:#ffd93d;stroke-width:3;filter:drop-shadow(0 0 6px #ffd93d);}
.node-group.highlight-2 .node-shape{stroke:#6bcb77;stroke-width:3;filter:drop-shadow(0 0 6px #6bcb77);}
.node-group.highlight-3 .node-shape{stroke:#4d96ff;stroke-width:3;filter:drop-shadow(0 0 6px #4d96ff);}
.node-group.highlight-4 .node-shape{stroke:#ff6bd6;stroke-width:3;filter:drop-shadow(0 0 6px #ff6bd6);}
.node-group.connect-target .node-shape{stroke:#8ab4f8;stroke-width:4;filter:drop-shadow(0 0 10px #8ab4f8);animation:pulse-target 1s infinite;}
@keyframes pulse-target{0%,100%{filter:drop-shadow(0 0 6px #8ab4f8);}50%{filter:drop-shadow(0 0 14px #8ab4f8);}}

/* INFO BUTTON */
.info-btn{cursor:pointer;}
.info-btn:hover circle{fill:var(--accent-bg);}
.info-btn.has-note circle{fill:#1a6a8a;}
.info-btn.has-todo circle{fill:#cc3333;}

/* EDGE LABEL */
.edge-label-bg{fill:var(--label-bg);stroke:var(--label-stroke);stroke-width:1;rx:3;ry:3;}
.edge-label-text{fill:var(--text-secondary);font-size:11px;pointer-events:none;}
.edge-label-group{cursor:pointer;}
.edge-label-group:hover .edge-label-bg{stroke:var(--edge-hover);}

/* EDGE ARROW TOGGLE ZONES */
.edge-arrow-zone{cursor:pointer;fill:transparent;stroke:transparent;stroke-width:2;transition:filter 0.2s, stroke 0.2s, fill 0.2s;}
.edge-arrow-zone:hover{stroke:var(--accent);fill:rgba(128,128,128,0.2);}

/* RIGHT PANEL */
#right-panel{width:260px;background:var(--bg-secondary);border-left:1px solid var(--border-color);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;z-index:50;}
#right-panel h3{padding:8px 10px;font-size:13px;color:var(--accent);border-bottom:1px solid var(--border-color);}
.panel-section{padding:8px 10px;border-bottom:1px solid var(--border-color);}
.panel-section label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:3px;}
.panel-section input,.panel-section select,.panel-section textarea{width:100%;background:var(--bg-input);border:1px solid var(--border-color);color:var(--text-primary);padding:4px 6px;border-radius:3px;font-size:12px;}
.panel-section textarea{min-height:60px;resize:vertical;font-family:inherit;}
.highlight-colors{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0;}
.highlight-color-btn{width:28px;height:28px;border-radius:50%;border:2px solid transparent;cursor:pointer;position:relative;}
.highlight-color-btn.active{border-color:var(--text-primary);box-shadow:0 0 6px rgba(255,255,255,0.3);}
.highlight-color-btn .toggle-vis{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--bg-tertiary);color:var(--text-muted);font-size:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border-color);}
.highlight-color-btn .toggle-vis.hidden{color:var(--text-muted);opacity:0.4;}
#note-editor{margin-top:6px;}
.todo-item{display:flex;align-items:center;gap:4px;margin:3px 0;}
.todo-item input[type=checkbox]{cursor:pointer;width:auto;flex-shrink:0;margin:0;}
.todo-item .todo-text{flex:1;background:transparent;border:none;color:var(--text-primary);font-size:12px;padding:2px;border-bottom:1px solid transparent;}
.todo-item .todo-text:focus{border-bottom-color:var(--accent);outline:none;}
.todo-item .todo-del{cursor:pointer;color:#ff4444;font-size:14px;background:none;border:none;}
.add-todo-btn{background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border-color);padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px;margin-top:4px;}
.add-todo-btn:hover{background:var(--accent-bg);color:var(--text-primary);}

/* NOTE POPUP */
#note-popup{position:absolute;background:var(--popup-bg);border:1px solid var(--border-color);border-radius:8px;padding:12px;z-index:200;box-shadow:0 4px 20px var(--shadow);min-width:250px;max-width:400px;display:none;}
#note-popup .note-popup-title{font-size:13px;font-weight:bold;color:var(--accent);margin-bottom:6px;}
#note-popup .note-popup-body{font-size:12px;color:var(--text-secondary);max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-word;}
#note-popup .note-popup-edit{background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border-color);padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px;margin-top:6px;}
#note-popup .note-popup-edit:hover{background:var(--accent-bg);color:var(--text-primary);}
#note-popup .note-popup-close{position:absolute;top:6px;right:8px;cursor:pointer;color:var(--text-muted);font-size:16px;background:none;border:none;}
#note-popup .note-popup-close:hover{color:var(--text-primary);}
#note-popup .note-popup-add-todo{background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border-color);padding:3px 10px;border-radius:3px;cursor:pointer;font-size:11px;margin-top:4px;margin-left:4px;}
#note-popup .note-popup-add-todo:hover{background:var(--accent-bg);color:var(--text-primary);}

/* GANTT PANEL */
#gantt-panel{background:var(--bg-secondary);border-top:2px solid var(--border-color);z-index:60;display:flex;flex-direction:column;transition:none;flex-shrink:0;}
#gantt-panel.collapsed{height:28px!important;}
#gantt-toggle{width:100%;height:28px;background:var(--bg-tertiary);border:none;color:var(--accent);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0;}
#gantt-toggle:hover{background:var(--accent-bg);}
#gantt-resize{width:100%;height:6px;cursor:ns-resize;background:transparent;flex-shrink:0;}
#gantt-resize:hover{background:var(--accent-bg-hover);opacity:0.3;}
#gantt-content{flex:1;position:relative;display:flex;flex-direction:column;overflow:hidden;}
#gantt-header{display:flex;align-items:center;padding:4px 8px;gap:6px;background:var(--bg-tertiary);border-bottom:1px solid var(--border-color);flex-shrink:0;overflow-x:auto;}
#gantt-header label{font-size:11px;color:var(--text-muted);}
#gantt-header input{background:var(--bg-input);border:1px solid var(--border-color);color:var(--text-primary);padding:2px 6px;border-radius:3px;font-size:11px;width:120px;}
#gantt-header button{background:var(--accent-bg);color:var(--text-secondary);border:1px solid var(--border-hover);padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px;}
#gantt-header button:hover{background:var(--accent-bg-hover);color:var(--text-primary);}
#gantt-body{flex:1;position:relative;overflow:auto;}
#gantt-canvas{position:absolute;top:0;left:0;}

/* GANTT TASK BARS */
.gantt-task-row{height:32px;position:relative;border-bottom:1px solid var(--gantt-grid);}
.gantt-task-row:nth-child(odd){background:var(--gantt-row-alt);}
.gantt-task-row.selected{background:var(--gantt-selected);}
.gantt-task-row.highlight-linked{background:var(--gantt-linked);}

/* CONTEXT MENU */
#context-menu{position:absolute;background:var(--ctx-bg);border:1px solid var(--border-color);border-radius:6px;padding:4px 0;z-index:300;box-shadow:0 4px 16px var(--shadow);display:none;min-width:160px;}
#context-menu .ctx-item{padding:6px 16px;cursor:pointer;font-size:12px;color:var(--text-secondary);}
#context-menu .ctx-item:hover{background:var(--accent-bg);color:var(--text-primary);}
#context-menu .ctx-sep{height:1px;background:var(--border-color);margin:2px 0;}

/* ADD NODE BUTTON AREA */
#add-node-area{position:absolute;top:10px;left:10px;display:flex;gap:4px;z-index:10;flex-wrap:wrap;max-width:500px;}
#add-node-area button{background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border-color);padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap;}
#add-node-area button:hover{background:var(--accent-bg);color:var(--text-primary);border-color:var(--border-hover);}
#add-node-area button.subgraph-bright{background:var(--accent-bg);color:var(--text-primary);border-color:var(--accent);box-shadow:0 0 8px var(--accent);font-weight:bold;}
#add-node-area .shape-btn { width: 32px; height: 32px; padding: 2px; display: inline-flex; justify-content: center; align-items: center; cursor: grab; }
#add-node-area .shape-btn:active { cursor: grabbing; }
#add-node-area .shape-btn svg { width: 100%; height: 100%; }

/* ZOOM CONTROLS */
#zoom-controls{position:absolute;bottom:10px;left:10px;display:flex;gap:4px;z-index:10;}
#zoom-controls button{background:var(--bg-tertiary);color:var(--text-secondary);border:1px solid var(--border-color);width:28px;height:28px;border-radius:4px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
#zoom-controls button:hover{background:var(--accent-bg);color:var(--text-primary);}
#zoom-level{color:var(--text-muted);font-size:11px;display:flex;align-items:center;padding:0 4px;}

/* TEMP EDGE */
#temp-edge{stroke:var(--accent);stroke-width:2;stroke-dasharray:6,3;pointer-events:none;}

/* SCROLLBAR */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:var(--scrollbar-track);}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-thumb-hover);}

/* SELECTION INFO */
#selection-info{position:absolute;bottom:10px;right:270px;background:var(--bg-tertiary);border:1px solid var(--border-color);padding:4px 10px;border-radius:4px;font-size:11px;color:var(--accent);z-index:10;display:none;}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div id="header">
    <button id="btn-new-ws" title="Новое рабочее пространство">+ Новое</button>
    <button id="btn-save-ws" title="Сохранить в файл">💾 Сохранить</button>
    <button id="btn-load-ws" title="Загрузить из файла">📂 Загрузить</button>
    <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 4px;"></div>
    <button id="btn-export-graph-svg" onclick="exportGraphSVG()" title="Экспорт графа в SVG">🖼️ Граф (SVG)</button>
    <button id="btn-export-graph-png" onclick="exportGraphPNG()" title="Экспорт графа в PNG">📷 Граф (PNG)</button>
    <button id="btn-export-gantt-png" onclick="exportGanttPNG()" title="Экспорт диаграммы Ганта в PNG">📊 Гант (PNG)</button>
    <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 4px;"></div>
    <div id="tabs-container"></div>
    <button id="theme-toggle" title="Переключить тему">🌙</button>
  </div>

  <!-- MAIN -->
  <div id="main-area">
    <!-- GRAPH -->
    <div id="graph-area">
      <div id="add-node-area">
        <button id="btn-add-subgraph" onclick="addSubgraph()">⊞ Сабграф</button>
        <button class="shape-btn" onmousedown="startDragNewNode(event, 'rect')" title="Прямоугольник"><svg viewBox="0 0 30 30"><rect x="2" y="5" width="26" height="20" fill="none" stroke="currentColor" stroke-width="2"/><text x="15" y="19" text-anchor="middle" font-size="14" fill="currentColor">+</text></svg></button>
        <button class="shape-btn" onmousedown="startDragNewNode(event, 'round')" title="Скруглённый"><svg viewBox="0 0 30 30"><rect x="2" y="5" width="26" height="20" rx="5" ry="5" fill="none" stroke="currentColor" stroke-width="2"/><text x="15" y="19" text-anchor="middle" font-size="14" fill="currentColor">+</text></svg></button>
        <button class="shape-btn" onmousedown="startDragNewNode(event, 'diamond')" title="Ромб"><svg viewBox="0 0 30 30"><polygon points="15,2 28,15 15,28 2,15" fill="none" stroke="currentColor" stroke-width="2"/><text x="15" y="19" text-anchor="middle" font-size="14" fill="currentColor">+</text></svg></button>
        <button class="shape-btn" onmousedown="startDragNewNode(event, 'circle')" title="Круг"><svg viewBox="0 0 30 30"><circle cx="15" cy="15" r="13" fill="none" stroke="currentColor" stroke-width="2"/><text x="15" y="19" text-anchor="middle" font-size="14" fill="currentColor">+</text></svg></button>
        <button class="shape-btn" onmousedown="startDragNewNode(event, 'stadium')" title="Стадиум"><svg viewBox="0 0 30 30"><rect x="2" y="8" width="26" height="14" rx="7" ry="7" fill="none" stroke="currentColor" stroke-width="2"/><text x="15" y="20" text-anchor="middle" font-size="12" fill="currentColor">+</text></svg></button>
        <button class="shape-btn" onmousedown="startDragNewNode(event, 'hexagon')" title="Шестиугольник"><svg viewBox="0 0 30 30"><polygon points="8,4 22,4 28,15 22,26 8,26 2,15" fill="none" stroke="currentColor" stroke-width="2"/><text x="15" y="20" text-anchor="middle" font-size="12" fill="currentColor">+</text></svg></button>
        <button class="shape-btn" onmousedown="startDragNewNode(event, 'parallelogram')" title="Параллелограмм"><svg viewBox="0 0 30 30"><polygon points="8,6 28,6 22,24 2,24" fill="none" stroke="currentColor" stroke-width="2"/><text x="15" y="20" text-anchor="middle" font-size="12" fill="currentColor">+</text></svg></button>
      </div>
      <div id="selection-info"></div>
      <div id="zoom-controls">
        <button onclick="zoomGraph(1.2)" title="Увеличить">+</button>
        <span id="zoom-level">100%</span>
        <button onclick="zoomGraph(0.8)" title="Уменьшить">−</button>
        <button onclick="resetZoom()" title="Сброс">⟲</button>
        <button id="btn-grid-snap" onclick="toggleGridSnap()" title="Привязка к сетке" style="color:var(--accent);border-color:var(--accent);">▦</button>
        <button id="btn-magnetic" onclick="toggleMagneticAlign()" title="Магнитное выравнивание" style="color:var(--accent);border-color:var(--accent);">🧲</button>
      </div>
      <svg id="graph-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <marker id="arrow-default" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="var(--edge-color)"/></marker>
          <marker id="arrow-hl-0" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ff6b6b"/></marker>
          <marker id="arrow-hl-1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ffd93d"/></marker>

          <marker id="arrow-rev-hl-1" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto"><polygon points="10 0, 0 3.5, 10 7" fill="#ffd93d"/></marker>
          <marker id="arrow-rev-hl-2" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto"><polygon points="10 0, 0 3.5, 10 7" fill="#6bcb77"/></marker>
          <marker id="arrow-rev-hl-3" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto"><polygon points="10 0, 0 3.5, 10 7" fill="#4d96ff"/></marker>

<script>
// ==================== STATE ====================
const HIGHLIGHT_COLORS = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bd6'];
let state = {
  workspaces: [],
  activeWsIndex: 0,
  theme: 'light',
};

let selectedNodes = []; // multi-selection with Shift
let selectedEdge = null;
let selectedSubgraph = null;
let draggingNode = null;
let dragOffset = {x:0,y:0};
let connectingNode = null;
let tempEdgeEnd = null;
let connectSourcePort = null;
let notePopupTarget = null;
let highlightNotes = {};
let highlightVisibility = {};
let gridSnap = true;
let magneticSnap = true;

function toggleGridSnap() {
  gridSnap = !gridSnap;
  const btn = document.getElementById('btn-grid-snap');
  btn.style.borderColor = gridSnap ? 'var(--accent)' : 'var(--border-color)';
  btn.style.color = gridSnap ? 'var(--accent)' : 'var(--text-secondary)';
}

function toggleMagneticAlign() {
  magneticSnap = !magneticSnap;
  const btn = document.getElementById('btn-magnetic');
  btn.style.borderColor = magneticSnap ? 'var(--accent)' : 'var(--border-color)';
  btn.style.color = magneticSnap ? 'var(--accent)' : 'var(--text-secondary)';
}

function startDragNewNode(e, shape) {
  const w = ws();
  const newNode = {
    id: 'n' + w.nextId++,
    name: 'Новый блок',
    shape: shape,
    x: 0,
    y: 0,
    w: 120, h: 40,
    fill: 'var(--node-fill)',
    textColor: 'var(--text-primary)',
    note: '',
    todos: [],
    highlightColors: [],
    subgraphId: null,
    ganttStart: 0,
    ganttDuration: 3,
    ganttExpanded: false
  };
  w.nodes.push(newNode);
  
  const gt = w.graphTransform;
  newNode.x = (e.clientX - gt.x) / gt.scale - 60;
  newNode.y = (e.clientY - gt.y) / gt.scale - 20;

  selectedNodes = [newNode.id];
  draggingNode = newNode;
  dragOffset = {x: 60, y: 20};
  
  renderGraph();
  updatePanel();
}
HIGHLIGHT_COLORS.forEach(c => { highlightVisibility[c] = true; });

function newWorkspace(name) {
  return {
    name: name || ('Пространство ' + (state.workspaces.length + 1)),
    nodes: [],
    edges: [],
    subgraphs: [],
    nextId: 1,
    unsaved: false,
    graphTransform: {x:0,y:0,scale:1},
    ganttConfig: {
      startDate: new Date().toISOString().split('T')[0],
      endDate: new Date(Date.now()+30*86400000).toISOString().split('T')[0],
      zoom: 1,
      scrollY: 0,
    }
  };
}

function ws() { return state.workspaces[state.activeWsIndex]; }
function markUnsaved() { ws().unsaved = true; renderTabs(); }

// ==================== INIT ====================
function init() {
  loadState();
  applyTheme();
  if (state.workspaces.length === 0) {
    state.workspaces.push(newWorkspace());
  }
  if (state.activeWsIndex >= state.workspaces.length) state.activeWsIndex = 0;
  renderTabs();
  renderGraph();
  renderGantt();
  setupHighlightManager();
  setupEventListeners();
  setupGanttResize();
  setupGanttToggle();
  setupGanttInteractions();
  setupGanttReorder();
  setTimeout(() => renderGantt(), 100);
}

// ==================== THEME ====================
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('theme-toggle').textContent = state.theme === 'dark' ? '🌙' : '☀️';
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  applyTheme();
  saveState();
  renderGraph();
  renderGantt();
}

// ==================== PERSISTENCE ====================
function saveState() {
  try {
    localStorage.setItem('planner_state', JSON.stringify(state));
  } catch(e) { console.warn('Save failed', e); }
}

function loadState() {
  try {
    const d = localStorage.getItem('planner_state');
    if (d) {
      const parsed = JSON.parse(d);
      state.workspaces = parsed.workspaces || [];
      state.activeWsIndex = parsed.activeWsIndex || 0;
      state.theme = parsed.theme || 'light';
      highlightNotes = parsed.highlightNotes || {};
      highlightVisibility = parsed.highlightVisibility || {};
      HIGHLIGHT_COLORS.forEach(c => { if (highlightVisibility[c] === undefined) highlightVisibility[c] = true; });
      state.workspaces.forEach(w => {
        if (!w.ganttConfig) w.ganttConfig = {startDate:new Date().toISOString().split('T')[0],endDate:new Date(Date.now()+30*86400000).toISOString().split('T')[0],zoom:1,scrollY:0};
        if (!w.graphTransform) w.graphTransform = {x:0,y:0,scale:1};
        w.nodes.forEach(n => { if(!n.todos) n.todos=[]; if(!n.highlightColors) n.highlightColors=[]; });
        w.edges.forEach(e => { if(!e.highlightColors) e.highlightColors=[]; if(!e.arrowStart) e.arrowStart='none'; if(!e.arrowEnd) e.arrowEnd='arrow'; });
        w.subgraphs.forEach(s => { if(!s.collapsed) s.collapsed=false; if(!s.highlightColors) s.highlightColors=[]; if(!s.nodeIds) s.nodeIds=[]; });
      });
    }
  } catch(e) { console.warn('Load failed', e); }
}

// ==================== TABS ====================
function renderTabs() {
  const c = document.getElementById('tabs-container');
  c.innerHTML = '';
  state.workspaces.forEach((w, i) => {
    const t = document.createElement('div');
    t.className = 'tab' + (i === state.activeWsIndex ? ' active' : '');
    t.innerHTML = `<span title="Двойной клик для переименования">${w.name}</span>${w.unsaved ? '<span class="unsaved">*</span>' : ''}<span class="close-tab" data-idx="${i}">✕</span>`;
    t.querySelector('span:first-child').onclick = () => switchWorkspace(i);
    t.querySelector('span:first-child').ondblclick = (e) => {
      e.stopPropagation();
      const nameSpan = t.querySelector('span:first-child');
      const input = document.createElement('input');
      input.value = w.name;
      input.style.cssText = 'background:var(--bg-input);color:var(--text-primary);border:1px solid var(--accent);font-size:12px;padding:2px;border-radius:2px;outline:none;line-height:1;width:100px;';
      const finishRename = () => {
        const newName = input.value.trim();
        if (newName && newName !== w.name) {
          w.name = newName;
          markUnsaved();
        }
        renderTabs();
      };
      input.onblur = finishRename;
      input.onkeydown = (ev) => { if (ev.key === 'Enter') finishRename(); else if (ev.key === 'Escape') renderTabs(); };
      nameSpan.replaceWith(input);
      input.focus();
    };
    t.querySelector('.close-tab').onclick = (e) => { e.stopPropagation(); closeWorkspace(i); };
    c.appendChild(t);
  });
}

function switchWorkspace(idx) {
  if (idx === state.activeWsIndex) return;
  state.activeWsIndex = idx;
  selectedNodes = [];
  selectedEdge = null;
  selectedSubgraph = null;
  renderTabs();
  renderGraph();
  renderGantt();
  updatePanel();
  saveState();
}

function closeWorkspace(idx) {
  if (state.workspaces.length <= 1) return;
  const w = state.workspaces[idx];
  if (w.unsaved && !confirm(`"${w.name}" имеет несохранённые изменения. Закрыть?`)) return;
  state.workspaces.splice(idx, 1);
  if (state.activeWsIndex >= state.workspaces.length) state.activeWsIndex = state.workspaces.length - 1;
  if (state.activeWsIndex > idx) state.activeWsIndex--;
  selectedNodes = [];
  selectedEdge = null;
  selectedSubgraph = null;
  renderTabs();
  renderGraph();
  renderGantt();
  updatePanel();
  saveState();
}

// ==================== NODES ====================
function addNode(shape) {
  const w = ws();
  const gt = w.graphTransform;
  const ga = document.getElementById('graph-area');
  const rect = ga.getBoundingClientRect();
  const cx = (rect.width/2 - gt.x) / gt.scale;
  const cy = (rect.height/2 - gt.y) / gt.scale;
  const node = {
    id: 'n' + w.nextId++,
    name: 'Задача ' + w.nextId,
    shape: shape,
    x: cx + (Math.random()-0.5)*100,
    y: cy + (Math.random()-0.5)*100,
    w: 140, h: 50,
    fill: '#16213e',
    textColor: '#e0e0e0',
    note: '',
    todos: [],
    highlightColors: [],
    subgraphId: null,
    ganttStart: 0,
    ganttDuration: 3,
  };
  const lastNode = w.nodes.length > 0 ? w.nodes[w.nodes.length-1] : null;
  if (lastNode) {
    node.ganttStart = lastNode.ganttStart + lastNode.ganttDuration;
  }
  w.nodes.push(node);
  markUnsaved();
  renderGraph();
  renderGantt();
  selectSingleNode(node.id);
}

function getNodeById(id) { return ws().nodes.find(n => n.id === id); }
function getEdgeById(id) { return ws().edges.find(e => e.id === id); }
function getSubgraphById(id) { return ws().subgraphs.find(s => s.id === id); }

function getNodeShapePath(shape, w, h) {
  const hw = w/2, hh = h/2;
  switch(shape) {
    case 'rect': return `M${-hw},${-hh} L${hw},${-hh} L${hw},${hh} L${-hw},${hh} Z`;
    case 'round': {
      const r = Math.min(hw,hh)*0.3;
      return `M${-hw+r},${-hh} L${hw-r},${-hh} Q${hw},${-hh} ${hw},${-hh+r} L${hw},${hh-r} Q${hw},${hh} ${hw-r},${hh} L${-hw+r},${hh} Q${-hw},${hh} ${-hw},${hh-r} L${-hw},${-hh+r} Q${-hw},${-hh} ${-hw+r},${-hh} Z`;
    }
    case 'diamond': return `M0,${-hh} L${hw},0 L0,${hh} L${-hw},0 Z`;
    case 'circle': {
      const r = Math.max(hw, hh);
      return `M${-r},0 A${r},${r} 0 1,0 ${r},0 A${r},${r} 0 1,0 ${-r},0`;
    }
    case 'stadium': {
      const r = hh;
      return `M${-hw+r},${-hh} L${hw-r},${-hh} A${r},${r} 0 0,1 ${hw-r},${hh} L${-hw+r},${hh} A${r},${r} 0 0,1 ${-hw+r},${-hh} Z`;
    }
    case 'hexagon': {
      const q = hw * 0.5;
      return `M${-hw+q},${-hh} L${hw-q},${-hh} L${hw},0 L${hw-q},${hh} L${-hw+q},${hh} L${-hw},0 Z`;
    }
    case 'parallelogram': {
      const s = hw * 0.25;
      return `M${-hw+s},${-hh} L${hw+s},${-hh} L${hw-s},${hh} L${-hw-s},${hh} Z`;
    }
    default: return `M${-hw},${-hh} L${hw},${-hh} L${hw},${hh} L${-hw},${hh} Z`;
  }
}

function getNodeBounds(node) {
  let hw = node.w/2, hh = node.h/2;
  if (node.shape === 'circle') { hw = hh = Math.max(node.w, node.h)/2; }
  return {x: node.x - hw, y: node.y - hh, w: node.w, h: node.h, cx: node.x, cy: node.y};
}

function getNodePort(node, targetX, targetY) {
  const b = getNodeBounds(node);
  const cx = b.cx, cy = b.cy;
  const dx = targetX - cx, dy = targetY - cy;
  const hw = b.w/2, hh = b.h/2;
  if (dx === 0 && dy === 0) return {x: cx + hw, y: cy};
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  const t = Math.min(hw / absDx, hh / absDy);
  return {x: cx + dx * t, y: cy + dy * t};
}

// ==================== SELECTION ====================
function selectSingleNode(id) {
  selectedNodes = [id];
  selectedEdge = null;
  selectedSubgraph = null;
  renderGraph();
  renderGantt();
  updatePanel();
  updateSelectionInfo();
}

function toggleNodeSelection(id, shiftKey) {
  if (shiftKey) {
    const idx = selectedNodes.indexOf(id);
    if (idx >= 0) selectedNodes.splice(idx, 1);
    else selectedNodes.push(id);
  } else {
    selectedNodes = [id];
  }
  selectedEdge = null;
  selectedSubgraph = null;
  renderGraph();
  renderGantt();
  updatePanel();
  updateSelectionInfo();
  updateSubgraphButton();
}

function selectEdge(id) {
  selectedNodes = [];
  selectedEdge = id;
  selectedSubgraph = null;
  renderGraph();
  renderGantt();
  updatePanel();
  updateSelectionInfo();
}

function selectSubgraph(id) {
  selectedNodes = [];
  selectedEdge = null;
  selectedSubgraph = id;
  renderGraph();
  renderGantt();
  updatePanel();
  updateSelectionInfo();
}

function clearSelection() {
  selectedNodes = [];
  selectedEdge = null;
  selectedSubgraph = null;
  renderGraph();
  renderGantt();
  updatePanel();
  updateSelectionInfo();
  updateSubgraphButton();
}

function updateSelectionInfo() {
  const el = document.getElementById('selection-info');
  if (selectedNodes.length > 1) {
    el.style.display = 'block';
    el.textContent = `Выделено нод: ${selectedNodes.length}`;
  } else {
    el.style.display = 'none';
  }
}

function updateSubgraphButton() {
  const btn = document.getElementById('btn-add-subgraph');
  if (selectedNodes.length > 1) {
    btn.classList.add('subgraph-bright');
  } else {
    btn.classList.remove('subgraph-bright');
  }
}

// ==================== SUBGRAPHS ====================
function addSubgraph() {
  const w = ws();
  const sg = {
    id: 'sg' + w.nextId++,
    name: 'Сабграф ' + w.nextId,
    nodeIds: [],
    collapsed: false,
    highlightColors: [],
  };

  // If multiple nodes selected, add them to subgraph
  if (selectedNodes.length > 1) {
    selectedNodes.forEach(nid => {
      const node = getNodeById(nid);
      if (node) {
        if (node.subgraphId) {
          const oldSg = getSubgraphById(node.subgraphId);
          if (oldSg) oldSg.nodeIds = oldSg.nodeIds.filter(id => id !== nid);
        }
        node.subgraphId = sg.id;
        sg.nodeIds.push(nid);
      }
    });
  }

  w.subgraphs.push(sg);
  markUnsaved();
  renderGraph();
  selectSubgraph(sg.id);
}

function toggleSubgraph(sgId) {
  const sg = getSubgraphById(sgId);
  if (!sg) return;
  sg.collapsed = !sg.collapsed;
  markUnsaved();
  renderGraph();
  renderGantt();
}

function addNodeToSubgraph(nodeId, sgId) {
  const node = getNodeById(nodeId);
  const sg = getSubgraphById(sgId);
  if (!node || !sg) return;
  if (node.subgraphId) {
    const oldSg = getSubgraphById(node.subgraphId);
    if (oldSg) oldSg.nodeIds = oldSg.nodeIds.filter(id => id !== nodeId);
  }
  node.subgraphId = sgId;
  if (!sg.nodeIds.includes(nodeId)) sg.nodeIds.push(nodeId);
  markUnsaved();
  renderGraph();
  updatePanel();
}

function removeNodeFromSubgraph(nodeId) {
  const node = getNodeById(nodeId);
  if (!node || !node.subgraphId) return;
  const sg = getSubgraphById(node.subgraphId);
  if (sg) sg.nodeIds = sg.nodeIds.filter(id => id !== nodeId);
  node.subgraphId = null;
  markUnsaved();
  renderGraph();
  updatePanel();
}

// ==================== EDGES ====================
function addEdge(fromId, toId) {
  const w = ws();
  const existing = w.edges.find(e => (e.from === fromId && e.to === toId) || (e.from === toId && e.to === fromId));
  if (existing) return;
  const edge = {
    id: 'e' + w.nextId++,
    from: fromId,
    to: toId,
    label: '',
    arrowStart: 'none',
    arrowEnd: 'arrow',
    color: '#5a6a8a',
    highlightColors: [],
  };
  w.edges.push(edge);
  markUnsaved();
  renderGraph();
  selectEdge(edge.id);
}

function deleteEdge(id) {
  const w = ws();
  w.edges = w.edges.filter(e => e.id !== id);
  if (selectedEdge === id) selectedEdge = null;
  markUnsaved();
  renderGraph();
  updatePanel();
}

function deleteNode(id) {
  const w = ws();
  w.edges = w.edges.filter(e => e.from !== id && e.to !== id);
  w.nodes = w.nodes.filter(n => n.id !== id);
  w.subgraphs.forEach(sg => sg.nodeIds = sg.nodeIds.filter(nid => nid !== id));
  selectedNodes = selectedNodes.filter(nid => nid !== id);
  markUnsaved();
  renderGraph();
  renderGantt();
  updateSelectionInfo();
  updateSubgraphButton();
  updatePanel();
}

function deleteSelectedNodes() {
  const w = ws();
  selectedNodes.forEach(id => {
    w.edges = w.edges.filter(e => e.from !== id && e.to !== id);
    w.nodes = w.nodes.filter(n => n.id !== id);
    w.subgraphs.forEach(sg => sg.nodeIds = sg.nodeIds.filter(nid => nid !== id));
  });
  selectedNodes = [];
  markUnsaved();
  renderGraph();
  renderGantt();
  updateSelectionInfo();
  updateSubgraphButton();
  updatePanel();
}

function deleteSubgraph(id) {
  const w = ws();
  const sg = getSubgraphById(id);
  if (sg) sg.nodeIds.forEach(nid => { const n = getNodeById(nid); if(n) n.subgraphId = null; });
  w.subgraphs = w.subgraphs.filter(s => s.id !== id);
  if (selectedSubgraph === id) selectedSubgraph = null;
  markUnsaved();
  renderGraph();
  updatePanel();
}

// ==================== RENDER GRAPH ====================
function renderGraph() {
  const w = ws();
  const svg = document.getElementById('graph-svg');
  const vp = document.getElementById('graph-viewport');
  const gt = w.graphTransform;
  vp.setAttribute('transform', `translate(${gt.x},${gt.y}) scale(${gt.scale})`);
  document.getElementById('zoom-level').textContent = Math.round(gt.scale*100)+'%';

  const nodesLayer = document.getElementById('nodes-layer');
  const edgesLayer = document.getElementById('edges-layer');
  const edgeControlsLayer = document.getElementById('edge-controls-layer');
  const subgraphsLayer = document.getElementById('subgraphs-layer');

  nodesLayer.innerHTML = '';
  edgesLayer.innerHTML = '';
  edgeControlsLayer.innerHTML = '';
  subgraphsLayer.innerHTML = '';

  // Render subgraphs
  w.subgraphs.forEach(sg => {
    if (sg.nodeIds.length === 0) return;
    if (sg.collapsed) {
      const firstNode = getNodeById(sg.nodeIds[0]);
      if (!firstNode) return;
      const cx = firstNode.x, cy = firstNode.y;
      const g = document.createElementNS('http://www.w3.org/2000/svg','g');
      g.setAttribute('class','node-group subgraph-collapsed');
      g.setAttribute('data-sg-id', sg.id);
      g.setAttribute('transform', `translate(${cx},${cy})`);

      const shape = document.createElementNS('http://www.w3.org/2000/svg','rect');
      shape.setAttribute('x', -80); shape.setAttribute('y', -30);
      shape.setAttribute('width', 160); shape.setAttribute('height', 60);
      shape.setAttribute('rx', 8); shape.setAttribute('ry', 8);
      shape.setAttribute('fill', 'var(--bg-tertiary)');
      shape.setAttribute('stroke', 'var(--border-hover)');
      shape.setAttribute('stroke-width', '2');
      shape.setAttribute('stroke-dasharray', '6,3');
      g.appendChild(shape);

      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('class','node-text');
      txt.setAttribute('text-anchor','middle');
      txt.setAttribute('dy','0.35em');
      txt.textContent = `⊞ ${sg.name} (${sg.nodeIds.length})`;
      g.appendChild(txt);

      sg.highlightColors.forEach(c => {
        const ci = HIGHLIGHT_COLORS.indexOf(c);
        if (ci >= 0) g.classList.add('highlight-'+ci);
      });

      // Expand button structure
      const collapseG = document.createElementNS('http://www.w3.org/2000/svg','g');
      collapseG.setAttribute('class','collapse-btn');
      collapseG.setAttribute('transform', `translate(60, -18)`);
      const cCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
      cCircle.setAttribute('r','8'); cCircle.setAttribute('fill','var(--collapse-bg)'); cCircle.setAttribute('stroke','var(--collapse-stroke)'); cCircle.setAttribute('stroke-width','1');
      collapseG.appendChild(cCircle);
      const cText = document.createElementNS('http://www.w3.org/2000/svg','text');
      cText.setAttribute('text-anchor','middle'); cText.setAttribute('dy','0.35em');
      cText.setAttribute('fill','var(--accent)'); cText.setAttribute('font-size','12');
      cText.textContent = '+';
      collapseG.appendChild(cText);
      collapseG.addEventListener('click', (e) => { e.stopPropagation(); toggleSubgraph(sg.id); });
      g.appendChild(collapseG);

      // Add dragging behavior for collapsed subgraph
      g.addEventListener('mousedown', (e) => {
        if (e.target.closest('.collapse-btn')) return;
        if (e.button !== 0) return;
        e.stopPropagation();
        selectSubgraph(sg.id);
        draggingNode = { isSubgraph: true, id: sg.id };
        const gt = ws().graphTransform;
        dragOffset.x = (e.clientX - gt.x) / gt.scale;
        dragOffset.y = (e.clientY - gt.y) / gt.scale;
      });

      g.addEventListener('dblclick', () => toggleSubgraph(sg.id));
      g.addEventListener('click', (e) => {
        if (e.target.closest('.collapse-btn')) return;
        e.stopPropagation();
        selectSubgraph(sg.id);
      });
      subgraphsLayer.appendChild(g);
      return;
    }

    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    sg.nodeIds.forEach(nid => {
      const n = getNodeById(nid);
      if (!n) return;
      const b = getNodeBounds(n);
      minX = Math.min(minX, b.x);
      minY = Math.min(minY, b.y);
      maxX = Math.max(maxX, b.x + b.w);
      maxY = Math.max(maxY, b.y + b.h);
    });
    if (minX === Infinity) return;
    const pad = 30;
    const sgX = minX - pad, sgY = minY - pad - 25;
    const sgW = (maxX - minX) + pad*2, sgH = (maxY - minY) + pad*2 + 25;

    const sgGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
    sgGroup.setAttribute('data-sg-id', sg.id);

    const sgRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    sgRect.setAttribute('x', sgX); sgRect.setAttribute('y', sgY);
    sgRect.setAttribute('width', sgW); sgRect.setAttribute('height', sgH);
    sgRect.setAttribute('class','subgraph-rect');
    sgGroup.appendChild(sgRect);

    const sgLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
    sgLabel.setAttribute('x', sgX + 12); sgLabel.setAttribute('y', sgY + 18);
    sgLabel.setAttribute('class','subgraph-label');
    sgLabel.textContent = sg.name;
    sgGroup.appendChild(sgLabel);

    sgRect.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.stopPropagation();
      selectSubgraph(sg.id);
      draggingNode = { isSubgraph: true, id: sg.id };
      const gt = ws().graphTransform;
      dragOffset.x = (e.clientX - gt.x) / gt.scale;
      dragOffset.y = (e.clientY - gt.y) / gt.scale;
    });

    const collapseG = document.createElementNS('http://www.w3.org/2000/svg','g');
    collapseG.setAttribute('class','collapse-btn');
    collapseG.setAttribute('transform', `translate(${sgX + sgW - 20},${sgY + 14})`);
    const cCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    cCircle.setAttribute('r','8'); cCircle.setAttribute('fill','var(--collapse-bg)'); cCircle.setAttribute('stroke','var(--collapse-stroke)'); cCircle.setAttribute('stroke-width','1');
    collapseG.appendChild(cCircle);
    const cText = document.createElementNS('http://www.w3.org/2000/svg','text');
    cText.setAttribute('text-anchor','middle'); cText.setAttribute('dy','0.35em');
    cText.setAttribute('fill','var(--accent)'); cText.setAttribute('font-size','12');
    cText.textContent = '−';
    collapseG.appendChild(cText);
    collapseG.addEventListener('click', (e) => { e.stopPropagation(); toggleSubgraph(sg.id); });
    sgGroup.appendChild(collapseG);

    sg.highlightColors.forEach(c => {
      const ci = HIGHLIGHT_COLORS.indexOf(c);
      if (ci >= 0) sgRect.style.stroke = c;
    });

    sgRect.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation();
      showContextMenu(e.clientX, e.clientY, [
        {label: 'Добавить ноду в сабграф', action: () => {
          const availNodes = w.nodes.filter(n => !n.subgraphId);
          if (availNodes.length === 0) { alert('Нет свободных нод'); return; }
          const nid = prompt('ID ноды для добавления:\n' + availNodes.map(n=>n.id+': '+n.name).join('\n'));
          if (nid && getNodeById(nid)) addNodeToSubgraph(nid, sg.id);
        }},
        {label: 'Разобрать сабграф (оставить блоки)', action: () => {
          sg.nodeIds.forEach(nid => { const n = getNodeById(nid); if(n) n.subgraphId = null; });
          deleteSubgraph(sg.id);
        }},
        {label: 'Удалить сабграф (без блоков)', action: () => deleteSubgraph(sg.id)},
      ]);
    });

    subgraphsLayer.appendChild(sgGroup);
  });

  // Render edges
  w.edges.forEach(edge => {
    const fromNode = getNodeById(edge.from);
    const toNode = getNodeById(edge.to);
    if (!fromNode || !toNode) return;

    let fromEffective = fromNode;
    let toEffective = toNode;
    if (fromNode.subgraphId) {
      const sg = getSubgraphById(fromNode.subgraphId);
      if (sg && sg.collapsed) fromEffective = getNodeById(sg.nodeIds[0]);
    }
    if (toNode.subgraphId) {
      const sg = getSubgraphById(toNode.subgraphId);
      if (sg && sg.collapsed) toEffective = getNodeById(sg.nodeIds[0]);
    }
    if (!fromEffective || !toEffective) return;
    if (fromEffective.id === toEffective.id) return; // Skip edges within the same collapsed subgraph!

    const p1 = getNodePort(fromEffective, toEffective.x, toEffective.y);
    const p2 = getNodePort(toEffective, fromEffective.x, fromEffective.y);

    const edgeGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
    edgeGroup.setAttribute('data-edge-id', edge.id);

    // Hit area
    const hitPath = document.createElementNS('http://www.w3.org/2000/svg','path');
    hitPath.setAttribute('d', `M${p1.x},${p1.y} L${p2.x},${p2.y}`);
    hitPath.setAttribute('class','edge-hitarea');
    hitPath.addEventListener('click', (e) => { e.stopPropagation(); selectEdge(edge.id); });
    edgeGroup.appendChild(hitPath);

    // Visible path
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${p1.x},${p1.y} L${p2.x},${p2.y}`);
    path.setAttribute('class','edge-path');
    
    let colorToUse = edge.color || '#5a6a8a';
    const hlCi = getHighlightColorIndex(edge);
    if (hlCi >= 0) {
      colorToUse = HIGHLIGHT_COLORS[hlCi];
      path.setAttribute('stroke-width', '3');
    }
    path.setAttribute('stroke', colorToUse);

    // Create dynamic marker if needed
    const colorIdStr = colorToUse.replace('#', '').replace(/[^a-zA-Z0-9]/g, '');
    const defs = document.querySelector('#graph-svg defs');
    if (!document.getElementById('arrow-' + colorIdStr)) {
      defs.insertAdjacentHTML('beforeend', `<marker id="arrow-${colorIdStr}" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="${colorToUse}"/></marker>`);
    }
    if (!document.getElementById('arrow-rev-' + colorIdStr)) {
      defs.insertAdjacentHTML('beforeend', `<marker id="arrow-rev-${colorIdStr}" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto"><polygon points="10 0, 0 3.5, 10 7" fill="${colorToUse}"/></marker>`);
    }

    if (edge.arrowEnd === 'arrow') {
      path.setAttribute('marker-end', `url(#arrow-${colorIdStr})`);
    }
    if (edge.arrowStart === 'arrow') {
      path.setAttribute('marker-start', `url(#arrow-rev-${colorIdStr})`);
    }

    if (selectedEdge === edge.id) {
      path.setAttribute('stroke-width', '4');
      path.setAttribute('stroke', 'var(--accent)');
    }

    edgeGroup.appendChild(path);
    edgesLayer.appendChild(edgeGroup);

    const controlsGroup = document.createElementNS('http://www.w3.org/2000/svg','g');

    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    let sX = p1.x, sY = p1.y;
    let eX = p2.x, eY = p2.y;
    if (len > 30) {
      sX = p1.x + (dx/len)*15;
      sY = p1.y + (dy/len)*15;
      eX = p2.x - (dx/len)*15;
      eY = p2.y - (dy/len)*15;
    }

    // Arrow toggle zones - start
    const arrowStartZone = document.createElementNS('http://www.w3.org/2000/svg','circle');
    arrowStartZone.setAttribute('cx', sX);
    arrowStartZone.setAttribute('cy', sY);
    arrowStartZone.setAttribute('r', '10');
    arrowStartZone.setAttribute('class', 'edge-arrow-zone' + (edge.arrowStart === 'arrow' ? ' active' : ''));
    arrowStartZone.addEventListener('click', (e) => {
      e.stopPropagation();
      edge.arrowStart = edge.arrowStart === 'arrow' ? 'none' : 'arrow';
      markUnsaved();
      renderGraph();
      updatePanel();
    });
    controlsGroup.appendChild(arrowStartZone);

    // Arrow toggle zones - end
    const arrowEndZone = document.createElementNS('http://www.w3.org/2000/svg','circle');
    arrowEndZone.setAttribute('cx', eX);
    arrowEndZone.setAttribute('cy', eY);
    arrowEndZone.setAttribute('r', '10');
    arrowEndZone.setAttribute('class', 'edge-arrow-zone' + (edge.arrowEnd === 'arrow' ? ' active' : ''));
    arrowEndZone.addEventListener('click', (e) => {
      e.stopPropagation();
      edge.arrowEnd = edge.arrowEnd === 'arrow' ? 'none' : 'arrow';
      markUnsaved();
      renderGraph();
      updatePanel();
    });
    controlsGroup.appendChild(arrowEndZone);

    // Edge label
    const mx = (p1.x + p2.x)/2, my = (p1.y + p2.y)/2;
    const labelG = document.createElementNS('http://www.w3.org/2000/svg','g');
    labelG.setAttribute('class','edge-label-group');
    labelG.setAttribute('transform', `translate(${mx},${my})`);

    const labelText = edge.label || '✎ примечание';
    const labelTxt = document.createElementNS('http://www.w3.org/2000/svg','text');
    labelTxt.setAttribute('class','edge-label-text');
    labelTxt.setAttribute('text-anchor','middle');
    labelTxt.setAttribute('dy','0.35em');
    labelTxt.textContent = labelText;
    const approxW = labelText.length * 6 + 10;
    const labelBg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    labelBg.setAttribute('x', -approxW/2); labelBg.setAttribute('y', -10);
    labelBg.setAttribute('width', approxW); labelBg.setAttribute('height', 20);
    labelBg.setAttribute('class','edge-label-bg');
    if (!edge.label) labelBg.setAttribute('stroke-dasharray','3,2');
    labelG.appendChild(labelBg);
    labelG.appendChild(labelTxt);
    labelG.addEventListener('click', (e) => {
      e.stopPropagation();
      selectEdge(edge.id);
      const input = document.getElementById('edge-label-input');
      setTimeout(() => input.focus(), 50);
    });

    controlsGroup.appendChild(labelG);
    edgeControlsLayer.appendChild(controlsGroup);
  });

  // Render nodes
  w.nodes.forEach(node => {
    if (node.subgraphId) {
      const sg = getSubgraphById(node.subgraphId);
      if (sg && sg.collapsed) return;
    }

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','node-group');
    g.setAttribute('data-node-id', node.id);
    g.setAttribute('transform', `translate(${node.x},${node.y})`);

    if (selectedNodes.includes(node.id)) {
      g.classList.add(selectedNodes.length > 1 ? 'multi-selected' : 'selected');
    }

    node.highlightColors.forEach(c => {
      const ci = HIGHLIGHT_COLORS.indexOf(c);
      if (ci >= 0) g.classList.add('highlight-'+ci);
    });

    // Shape
    let hw = node.w/2, hh = node.h/2;
    if (node.shape === 'circle') { hw = hh = Math.max(node.w, node.h)/2; }
    const shape = document.createElementNS('http://www.w3.org/2000/svg','path');
    shape.setAttribute('d', getNodeShapePath(node.shape, node.w, node.h));
    shape.setAttribute('class','node-shape');
    shape.setAttribute('fill', node.fill || 'var(--node-fill)');
    g.appendChild(shape);

    // Text
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('class','node-text');
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('dy','0.35em');
    txt.setAttribute('fill', node.textColor || 'var(--text-primary)');
    txt.textContent = node.name;
    g.appendChild(txt);

    // Info button
    const infoG = document.createElementNS('http://www.w3.org/2000/svg','g');
    infoG.setAttribute('class','info-btn');
    infoG.setAttribute('transform', `translate(${hw + 14},${-hh + 2})`);
    const infoCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    infoCircle.setAttribute('r','8'); infoCircle.setAttribute('fill','var(--info-btn-bg)'); infoCircle.setAttribute('stroke','var(--info-btn-stroke)'); infoCircle.setAttribute('stroke-width','1');
    infoG.appendChild(infoCircle);
    const infoText = document.createElementNS('http://www.w3.org/2000/svg','text');
    infoText.setAttribute('text-anchor','middle'); infoText.setAttribute('dy','0.35em');
    infoText.setAttribute('fill','var(--text-muted)'); infoText.setAttribute('font-size','11'); infoText.setAttribute('font-weight','bold');
    infoText.textContent = 'i';
    infoG.appendChild(infoText);

    const isLight = state.theme === 'light';
    const hasNote = node.note && node.note.trim().length > 0;
    const hasTodos = node.todos && node.todos.length > 0;
    const hasUnfinishedTodos = hasTodos && node.todos.some(t => !t.done);
    if (hasUnfinishedTodos) {
      infoCircle.setAttribute('fill', isLight ? '#fef2f2' : '#8b2020');
      infoCircle.setAttribute('stroke', 'var(--todo-pending)');
      infoText.setAttribute('fill', 'var(--todo-pending)');
      infoG.classList.add('has-todo');
    } else if (hasNote || hasTodos) {
      if (hasTodos && !hasNote) {
        infoCircle.setAttribute('fill', 'var(--todo-done)');
        infoCircle.setAttribute('stroke', 'var(--todo-done)');
        infoText.setAttribute('fill', '#ffffff');
      } else {
        infoCircle.setAttribute('fill', 'var(--accent)');
        infoCircle.setAttribute('stroke', 'var(--accent)');
        infoText.setAttribute('fill', '#ffffff');
      }
      infoG.classList.add('has-note');
    }

    infoG.addEventListener('click', (e) => {
      e.stopPropagation();
      showNotePopup(node, e.clientX, e.clientY);
    });
    g.appendChild(infoG);

    // Connection port
    const portX = hw;
    const portCircle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    portCircle.setAttribute('cx', portX); portCircle.setAttribute('cy', 0);
    portCircle.setAttribute('r','6'); portCircle.setAttribute('fill','var(--port-bg)');
    portCircle.setAttribute('stroke','var(--port-stroke)'); portCircle.setAttribute('stroke-width','1.5');
    portCircle.style.cursor = 'crosshair';
    portCircle.setAttribute('class','connection-port');

    portCircle.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      e.preventDefault();
      connectingNode = node.id;
      // Calculate absolute port position
      connectSourcePort = {x: node.x + portX, y: node.y};
      tempEdgeEnd = {x: node.x + portX, y: node.y};
    });

    g.appendChild(portCircle);

    // Drag / selection
    g.addEventListener('mousedown', (e) => {
      if (e.target === portCircle || e.target.closest('.info-btn') || e.target.closest('.connection-port')) return;
      e.stopPropagation();
      toggleNodeSelection(node.id, e.shiftKey);
      
      let draggingTarget = node;
      
      if (e.ctrlKey || e.metaKey) {
        const w = ws();
        const newNode = {...node, id: 'n'+w.nextId++, name: node.name+' (копия)', x: node.x, y: node.y, todos: node.todos.map(t=>({...t})), highlightColors: [...(node.highlightColors||[])], subgraphId: null};
        w.nodes.push(newNode);
        selectedNodes = [newNode.id];
        draggingTarget = newNode;
      }
      
      draggingNode = draggingTarget;
      const gt = ws().graphTransform;
      dragOffset.x = (e.clientX - gt.x) / gt.scale - draggingTarget.x;
      dragOffset.y = (e.clientY - gt.y) / gt.scale - draggingTarget.y;
    });

    g.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      e.stopPropagation();
      showNodeContextMenu(e.clientX, e.clientY, node);
    });

    nodesLayer.appendChild(g);
  });

  updateSubgraphButton();
}

function getHighlightColorIndex(el) {
  if (!el.highlightColors || el.highlightColors.length === 0) return -1;
  return HIGHLIGHT_COLORS.indexOf(el.highlightColors[0]);
}

// ==================== PANEL ====================
function updatePanel() {
  document.getElementById('panel-no-selection').style.display = 'none';
  document.getElementById('panel-node-props').style.display = 'none';
  document.getElementById('panel-edge-props').style.display = 'none';
  document.getElementById('panel-subgraph-props').style.display = 'none';

  if (selectedNodes.length === 1) {
    const node = getNodeById(selectedNodes[0]);
    if (!node) return;
    document.getElementById('panel-node-props').style.display = 'block';
    document.getElementById('prop-name').value = node.name;
    document.getElementById('prop-shape').value = node.shape;
    document.getElementById('prop-note').value = node.note || '';
    renderHighlightColors('highlight-colors', node, () => { renderGraph(); renderGantt(); });
    renderTodoList(node);
  } else if (selectedNodes.length > 1) {
    // Multi-selection panel
    document.getElementById('panel-node-props').style.display = 'block';
    document.getElementById('prop-name').value = `[${selectedNodes.length} нод выделено]`;
    document.getElementById('prop-name').disabled = true;
    document.getElementById('prop-shape').disabled = true;
    document.getElementById('prop-note').style.display = 'none';
    document.getElementById('prop-todo-list').innerHTML = '';
    document.querySelector('.add-todo-btn').style.display = 'none';
    document.getElementById('highlight-colors').innerHTML = '';
  } else {
    // Reset disabled states
    document.getElementById('prop-name').disabled = false;
    document.getElementById('prop-shape').disabled = false;
    document.getElementById('prop-note').style.display = '';
    document.querySelector('.add-todo-btn').style.display = '';
  }

  if (selectedEdge) {
    const edge = getEdgeById(selectedEdge);
    if (!edge) return;
    document.getElementById('panel-edge-props').style.display = 'block';
    document.getElementById('edge-label-input').value = edge.label || '';
    document.getElementById('edge-arrow-start').value = edge.arrowStart || 'none';
    document.getElementById('edge-arrow-end').value = edge.arrowEnd || 'arrow';
    document.getElementById('edge-color').value = edge.color || '#5a6a8a';
    renderHighlightColors('edge-highlight-colors', edge, () => { renderGraph(); renderGantt(); });
  }

  if (selectedSubgraph) {
    const sg = getSubgraphById(selectedSubgraph);
    if (!sg) return;
    document.getElementById('panel-subgraph-props').style.display = 'block';
    document.getElementById('subgraph-name').value = sg.name;
    const listEl = document.getElementById('subgraph-nodes-list');
    listEl.innerHTML = sg.nodeIds.map(nid => {
      const n = getNodeById(nid);
      return n ? `${n.id}: ${n.name}` : nid;
    }).join('<br>') || '(пусто)';

    document.getElementById('panel-no-selection').style.display = 'block';

// ==================== EVENT LISTENERS ====================
function setupEventListeners() {
  const svg = document.getElementById('graph-svg');

  document.addEventListener('mousemove', (e) => {
    if (draggingNode) {
      const gt = ws().graphTransform;
      const w = ws();
      if (draggingNode.isSubgraph) {
        const dx = ((e.clientX - gt.x) / gt.scale) - dragOffset.x;
        const dy = ((e.clientY - gt.y) / gt.scale) - dragOffset.y;
        dragOffset.x = (e.clientX - gt.x) / gt.scale;
        dragOffset.y = (e.clientY - gt.y) / gt.scale;
        const sg = getSubgraphById(draggingNode.id);
        if (sg) {
          sg.nodeIds.forEach(nid => {
            const n = getNodeById(nid);
            if (n) { n.x += dx; n.y += dy; }
          });
        }
      } else {
        let nx = (e.clientX - gt.x) / gt.scale - dragOffset.x;
        let ny = (e.clientY - gt.y) / gt.scale - dragOffset.y;
        
        if (gridSnap) {
          nx = Math.round(nx / 5) * 5;
          ny = Math.round(ny / 5) * 5;
        }

        if (magneticSnap) {
          const tol = 5;
          for (let n of w.nodes) {
            if (n.id !== draggingNode.id && !n.isNew) {
              // align x
              if (Math.abs(nx - n.x) < tol) nx = n.x;
              // align y
              if (Math.abs(ny - n.y) < tol) ny = n.y;
            }
          }
        }

        draggingNode.x = nx;
        draggingNode.y = ny;
      }
      renderGraph();
    }
    if (connectingNode && tempEdgeEnd) {
      const gt = ws().graphTransform;
      tempEdgeEnd.x = (e.clientX - gt.x) / gt.scale;
      tempEdgeEnd.y = (e.clientY - gt.y) / gt.scale;
      renderTempEdge();
      highlightConnectTarget(e);
    }
  });

  document.addEventListener('mouseup', (e) => {
    if (draggingNode) {
      markUnsaved();
      draggingNode = null;
    }
    if (connectingNode) {
      const gt = ws().graphTransform;
      const mx = (e.clientX - gt.x) / gt.scale;
      const my = (e.clientY - gt.y) / gt.scale;
      const w = ws();
      let targetNode = null;
      for (const n of w.nodes) {
        if (n.id === connectingNode) continue;
        const b = getNodeBounds(n);
        if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
          targetNode = n;
          break;
        }
      }
      if (targetNode) {
        addEdge(connectingNode, targetNode.id);
      }
      connectingNode = null;
      tempEdgeEnd = null;
      connectSourcePort = null;
      removeTempEdge();
      clearConnectTargets();
    }
  });

  svg.addEventListener('mousedown', (e) => {
    if (e.button === 0 && e.target.closest('svg') === svg && !e.target.closest('.node-group') && !e.target.closest('.edge-hitarea') && !e.target.closest('.edge-label-group') && !e.target.closest('.subgraph-rect') && !e.target.closest('.collapse-btn') && !e.target.closest('.edge-arrow-zone') && !e.target.closest('#add-node-area') && !e.target.closest('#zoom-controls')) {
      const startX = e.clientX, startY = e.clientY;
      const startTx = ws().graphTransform.x, startTy = ws().graphTransform.y;
      const onMove = (ev) => {
        ws().graphTransform.x = startTx + (ev.clientX - startX);
        ws().graphTransform.y = startTy + (ev.clientY - startY);
        renderGraph();
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }
  });

  svg.addEventListener('click', (e) => {
    if (!e.target.closest('.node-group') && !e.target.closest('.edge-hitarea') && !e.target.closest('.edge-label-group') && !e.target.closest('.edge-arrow-zone') && !e.target.closest('.subgraph-rect') && !e.target.closest('.collapse-btn') && !e.target.closest('#add-node-area') && !e.target.closest('#zoom-controls')) {
      clearSelection();
    }
  });

  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const gt = ws().graphTransform;
    const rect = svg.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const newScale = Math.max(0.1, Math.min(5, gt.scale * factor));
    const ratio = newScale / gt.scale;
    gt.x = mx - (mx - gt.x) * ratio;
    gt.y = my - (my - gt.y) * ratio;
    gt.scale = newScale;
    renderGraph();
    saveState();
  }, {passive: false});

  document.addEventListener('click', (e) => {
    document.getElementById('context-menu').style.display = 'none';
    const popup = document.getElementById('note-popup');
    if (popup.style.display === 'block' && !popup.contains(e.target) && !e.target.closest('.info-btn')) {
      closeNotePopup();
    }
  });

  // Header buttons
  document.getElementById('btn-new-ws').onclick = () => {
    state.workspaces.push(newWorkspace());
    state.activeWsIndex = state.workspaces.length - 1;
    selectedNodes = [];
    renderTabs();
    renderGraph();
    renderGantt();
    clearSelection();
    saveState();
  };

  document.getElementById('btn-save-ws').onclick = () => {
    exportWorkspaceToFile();
  };

  document.getElementById('btn-load-ws').onclick = () => {
    document.getElementById('file-input').click();
  };

  document.getElementById('file-input').onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.nodes) {
          const newWs = {
            name: file.name.replace('.json',''),
            nodes: data.nodes || [],
            edges: data.edges || [],
            subgraphs: data.subgraphs || [],
            nextId: data.nextId || 100,
            unsaved: false,
            graphTransform: data.graphTransform || {x:0,y:0,scale:1},
            ganttConfig: data.ganttConfig || {startDate:new Date().toISOString().split('T')[0],endDate:new Date(Date.now()+30*86400000).toISOString().split('T')[0],zoom:1,scrollY:0},
          };
          newWs.nodes.forEach(n => { if(!n.todos) n.todos=[]; if(!n.highlightColors) n.highlightColors=[]; });
          newWs.edges.forEach(e => { if(!e.highlightColors) e.highlightColors=[]; if(!e.arrowStart) e.arrowStart='none'; if(!e.arrowEnd) e.arrowEnd='arrow'; });
          newWs.subgraphs.forEach(s => { if(!s.collapsed) s.collapsed=false; if(!s.highlightColors) s.highlightColors=[]; if(!s.nodeIds) s.nodeIds=[]; });
          state.workspaces.push(newWs);
          state.activeWsIndex = state.workspaces.length - 1;
          selectedNodes = [];
          renderTabs();
          renderGraph();
          renderGantt();
          clearSelection();
          saveState();
        }
      } catch(err) {
        alert('Ошибка загрузки: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  document.getElementById('theme-toggle').onclick = toggleTheme;

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') return;
      if (selectedNodes.length > 0) { deleteSelectedNodes(); e.preventDefault(); }
      else if (selectedEdge) { deleteEdge(selectedEdge); e.preventDefault(); }
      else if (selectedSubgraph) { deleteSubgraph(selectedSubgraph); e.preventDefault(); }
    }
    if (e.ctrlKey && e.key === 's') {
      e.preventDefault();
      exportWorkspaceToFile();
    }
  });

  document.getElementById('gantt-start').addEventListener('change', (e) => {
    ws().ganttConfig.startDate = e.target.value;
    markUnsaved();
    renderGantt();
    saveState();
  });
  document.getElementById('gantt-end').addEventListener('change', (e) => {
    ws().ganttConfig.endDate = e.target.value;
    markUnsaved();
    renderGantt();
    saveState();
  });

  window.addEventListener('beforeunload', () => { saveState(); });
}

// ==================== EXPORT TO IMAGES ====================
function getSvgString(svgNode) {
  const clone = svgNode.cloneNode(true);
  clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  clone.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') || 'light');
  
  const style = document.createElement('style');
  style.textContent = document.querySelector('style').textContent;
  clone.insertBefore(style, clone.firstChild);

  const w = ws();
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  w.nodes.forEach(n => {
     const b = getNodeBounds(n);
     if (b.x < minX) minX = b.x;
     if (b.y < minY) minY = b.y;
     if (b.x+b.w > maxX) maxX = b.x+b.w;
     if (b.y+b.h > maxY) maxY = b.y+b.h;
  });
  if(minX === Infinity) { minX=0; minY=0; maxX=800; maxY=600; }
  
  const pad = 50;
  const vWidth = (maxX-minX)+pad*2;
  const vHeight = (maxY-minY)+pad*2;
  const vX = minX-pad;
  const vY = minY-pad;
  
  clone.setAttribute('viewBox', `${vX} ${vY} ${vWidth} ${vHeight}`);
  clone.setAttribute('width', vWidth);
  clone.setAttribute('height', vHeight);
  
  const bgRect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  bgRect.setAttribute('x', vX);
  bgRect.setAttribute('y', vY);
  bgRect.setAttribute('width', vWidth);
  bgRect.setAttribute('height', vHeight);
  bgRect.setAttribute('fill', 'var(--bg-primary)');
  clone.insertBefore(bgRect, clone.firstChild);
  
  const vp = clone.querySelector('#graph-viewport');
  if (vp) vp.setAttribute('transform', '');

  const serializer = new XMLSerializer();
  return serializer.serializeToString(clone);
}

function exportGraphSVG() {
  const svgString = getSvgString(document.getElementById('graph-svg'));
  const blob = new Blob([svgString], {type:"image/svg+xml;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = ws().name + '_граф.svg';
  a.click();
  URL.revokeObjectURL(url);
}

function exportGraphPNG() {
  const svgString = getSvgString(document.getElementById('graph-svg'));
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  const blob = new Blob([svgString], {type: 'image/svg+xml;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  img.onload = function () {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = ws().name + '_граф.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}

// ==================== EXPORT TO FILE ====================
function exportWorkspaceToFile() {
  const w = ws();
  const data = JSON.stringify({
    name: w.name,
    nodes: w.nodes,
    edges: w.edges,
    subgraphs: w.subgraphs,
    nextId: w.nextId,
    graphTransform: w.graphTransform,
    ganttConfig: w.ganttConfig,
  }, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = w.name.replace(/[^a-zA-Zа-яА-Я0-9\s_-]/g,'') + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  w.unsaved = false;
  renderTabs();
  saveState();
}
