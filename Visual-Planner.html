function renderTempEdge() {
  removeTempEdge();
  if (!connectingNode || !tempEdgeEnd || !connectSourcePort) return;
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.id = 'temp-edge';
  line.setAttribute('x1', connectSourcePort.x);
  line.setAttribute('y1', connectSourcePort.y);
  line.setAttribute('x2', tempEdgeEnd.x);
  line.setAttribute('y2', tempEdgeEnd.y);
  line.setAttribute('marker-end', 'url(#arrow-default)');
  document.getElementById('edges-layer').appendChild(line);
}

function removeTempEdge() {
  const el = document.getElementById('temp-edge');
  if (el) el.remove();
}

function highlightConnectTarget(e) {
  clearConnectTargets();
  if (!connectingNode) return;
  const gt = ws().graphTransform;
  const mx = (e.clientX - gt.x) / gt.scale;
  const my = (e.clientY - gt.y) / gt.scale;
  const w = ws();
  for (const n of w.nodes) {
    if (n.id === connectingNode) continue;
    const b = getNodeBounds(n);
    if (mx >= b.x && mx <= b.x + b.w && my >= b.y && my <= b.y + b.h) {
      const g = document.querySelector(`.node-group[data-node-id="${n.id}"]`);
      if (g) g.classList.add('connect-target');
      break;
    }
  }
}

function clearConnectTargets() {
  document.querySelectorAll('.connect-target').forEach(el => el.classList.remove('connect-target'));
}

// ==================== ZOOM ====================
function zoomGraph(factor) {
  const gt = ws().graphTransform;
  const svg = document.getElementById('graph-svg');
  const rect = svg.getBoundingClientRect();
  const cx = rect.width/2, cy = rect.height/2;
  const newScale = Math.max(0.1, Math.min(5, gt.scale * factor));
  const ratio = newScale / gt.scale;
  gt.x = cx - (cx - gt.x) * ratio;
  gt.y = cy - (cy - gt.y) * ratio;
  gt.scale = newScale;
  renderGraph();
  saveState();
}

function resetZoom() {
  ws().graphTransform = {x:0,y:0,scale:1};
  renderGraph();
  saveState();
}

// ==================== GANTT CHART ====================
let ganttDragging = null;
let ganttResizing = null;
let ganttDragStart = 0;
let ganttDragOrigStart = 0;
let ganttDragOrigDuration = 0;

function renderGantt() {
  const w = ws();
  const gc = w.ganttConfig;
  const panel = document.getElementById('gantt-panel');
  const isCollapsed = panel.classList.contains('collapsed');

  document.getElementById('gantt-start').value = gc.startDate;
  document.getElementById('gantt-end').value = gc.endDate;

  if (isCollapsed) return;

  const canvas = document.getElementById('gantt-canvas');
  const body = document.getElementById('gantt-body');
  const bw = body.clientWidth;
  const bh = body.clientHeight;
  if (bw <= 0 || bh <= 0) return;

  const startDate = new Date(gc.startDate);
  const endDate = new Date(gc.endDate);
  const totalDays = Math.max(1, (endDate - startDate) / 86400000);
  const pxPerDay = (bw - 160) / totalDays * (gc.zoom || 1);
  const rowH = 32;
  const headerH = 28;

  let currentY = headerH;
  const renderedRows = [];
  w.nodes.forEach((node, i) => {
    const hasTodos = node.todos && node.todos.length > 0;
    const taskHR = rowH + (node.ganttExpanded && hasTodos ? node.todos.length * 20 : 0);
    renderedRows.push({ node, idx: i, y: currentY, h: taskHR, isEven: i % 2 === 0 });
    currentY += taskHR;
  });

  const totalH = currentY;
  const totalW = Math.max(bw, 160 + totalDays * pxPerDay);

  canvas.width = totalW;
  canvas.height = Math.max(totalH, bh);
  canvas.style.width = totalW + 'px';
  canvas.style.height = Math.max(totalH, bh) + 'px';

  const ctx = canvas.getContext('2d');
  const isLight = state.theme === 'light';
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = isLight ? '#f0f2f5' : '#1a1a2e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = isLight ? 'rgba(208,213,221,0.4)' : 'rgba(15,52,96,0.3)';
  ctx.lineWidth = 1;
  for (let d = 0; d <= totalDays; d++) {
    const x = 160 + d * pxPerDay;
    ctx.beginPath();
    ctx.moveTo(x, headerH);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();

    const step = Math.max(1, Math.ceil(65 / pxPerDay));
    if (d % step === 0) {
      const date = new Date(startDate.getTime() + d * 86400000);
      ctx.fillStyle = isLight ? '#667085' : '#555';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(date.toLocaleDateString('ru-RU', {day:'2-digit', month:'2-digit', year:'numeric'}), x, headerH - 4);
    }
  }

  renderedRows.forEach(({node, idx, y, h, isEven}) => {
    if (isEven) {
      ctx.fillStyle = isLight ? 'rgba(240,242,245,0.5)' : 'rgba(26,26,46,0.3)';
      ctx.fillRect(0, y, canvas.width, h);
    }

    const isLinked = selectedNodes.length > 0 && selectedNodes.some(sid => isNodeLinked(node.id, sid));
    const isSelected = selectedNodes.includes(node.id);

    if (isSelected) {
      ctx.fillStyle = isLight ? 'rgba(46,111,217,0.15)' : 'rgba(26,74,138,0.4)';
      ctx.fillRect(0, y, canvas.width, h);
    } else if (isLinked) {
      ctx.fillStyle = isLight ? 'rgba(46,111,217,0.08)' : 'rgba(26,74,138,0.15)';
      ctx.fillRect(0, y, canvas.width, h);
    }

    ctx.fillStyle = isLight ? '#344054' : '#aaa';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(node.name, 8, y + rowH/2, 130);

    if (node.todos && node.todos.length > 0) {
      ctx.fillStyle = isLight ? '#2e6fd9' : '#8ab4f8';
      ctx.fillText(node.ganttExpanded ? '▼' : '▶', 145, y + rowH/2);
    }

    const barX = 160 + node.ganttStart * pxPerDay;
    const barW = Math.max(4, node.ganttDuration * pxPerDay);
    const barY = y + 4;
    const barH = rowH - 8;

    const grad = ctx.createLinearGradient(barX, barY, barX, barY + barH);
    if (isSelected) {
      grad.addColorStop(0, isLight ? '#2e6fd9' : '#2a5a9a');
      grad.addColorStop(1, isLight ? '#1a4a8a' : '#1a4a8a');
    } else if (isLinked) {
      grad.addColorStop(0, isLight ? '#98b8e8' : '#1a3a6a');
      grad.addColorStop(1, isLight ? '#7aa3d8' : '#0f2a5a');
    } else {
      grad.addColorStop(0, isLight ? '#d4e4ff' : '#0f3460');
      grad.addColorStop(1, isLight ? '#b8d4ff' : '#1a4a8a');
    }
    ctx.fillStyle = grad;
    roundRect(ctx, barX, barY, barW, barH, 4);
    ctx.fill();

    ctx.strokeStyle = isSelected ? (isLight ? '#2e6fd9' : '#8ab4f8') : (isLinked ? (isLight ? '#98b8e8' : '#8ab4f888') : (isLight ? '#2e6fd9' : '#2a5a9a'));
    ctx.lineWidth = isSelected ? 2 : 1;
    roundRect(ctx, barX, barY, barW, barH, 4);
    ctx.stroke();

    if (barW > 30) {
      ctx.fillStyle = isLight ? '#1d2939' : '#ccc';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      ctx.fillText(node.name, barX + 6, barY + barH/2, barW - 12);
    }

    if (isSelected) {
      ctx.fillStyle = isLight ? 'rgba(46,111,217,0.3)' : 'rgba(138,180,248,0.3)';
      ctx.fillRect(barX - 2, barY, 6, barH);
      ctx.fillRect(barX + barW - 4, barY, 6, barH);
    }
    
    if (node.ganttExpanded && node.todos && node.todos.length > 0) {
      node.todos.forEach((todo, tidx) => {
        const todoY = y + rowH + tidx * 20;
        ctx.fillStyle = isLight ? '#475467' : '#aaa';
        ctx.font = '11px sans-serif';
        // Left side text
        ctx.fillText((todo.done ? '☑ ' : '☐ ') + todo.text, 20, todoY + 10, 130);
        // Right side (chart) text
        ctx.fillText((todo.done ? '☑ ' : '☐ ') + todo.text, barX + 6, todoY + 10, Math.max(20, totalW - barX - 10));
      });
    }
  });

  const today = new Date();
  const todayDay = (today - startDate) / 86400000;
  if (todayDay >= 0 && todayDay <= totalDays) {
    const tx = 160 + todayDay * pxPerDay;
    ctx.strokeStyle = 'rgba(255,107,107,0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    ctx.moveTo(tx, 0);
    ctx.lineTo(tx, canvas.height);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function isNodeLinked(nodeId, selectedId) {
  return ws().edges.some(e =>
    (e.from === selectedId && e.to === nodeId) ||
    (e.to === selectedId && e.from === nodeId)
  );
}

function ganttZoom(factor) {
  ws().ganttConfig.zoom = Math.max(0.1, Math.min(10, (ws().ganttConfig.zoom || 1) * factor));
  renderGantt();
  saveState();
}

function ganttFit() {
  const w = ws();
  const body = document.getElementById('gantt-body');
  const bw = body.clientWidth - 160;
  if (w.nodes.length === 0 || bw <= 0) return;
  const maxEnd = Math.max(...w.nodes.map(n => n.ganttStart + n.ganttDuration));
  const totalDays = Math.max(1, maxEnd + 5);
  w.ganttConfig.zoom = bw / (totalDays * (bw / Math.max(1, (new Date(w.ganttConfig.endDate) - new Date(w.ganttConfig.startDate)) / 86400000)));
  if (isNaN(w.ganttConfig.zoom) || w.ganttConfig.zoom <= 0) w.ganttConfig.zoom = 1;
  renderGantt();
  saveState();
}

function setupGanttInteractions() {
  const body = document.getElementById('gantt-body');
  const canvas = document.getElementById('gantt-canvas');

  canvas.addEventListener('mousedown', (e) => {
    const w = ws();
    const gc = w.ganttConfig;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left + body.scrollLeft;
    const my = e.clientY - rect.top + body.scrollTop;
    const headerH = 28;
    const rowH = 32;
    const startDate = new Date(gc.startDate);
    const endDate = new Date(gc.endDate);
    const totalDays = Math.max(1, (endDate - startDate) / 86400000);
    const bw = body.clientWidth;
    const pxPerDay = (bw - 160) / totalDays * (gc.zoom || 1);

    let rowNode = null;
    let rowStart = headerH;
    let rowIdx = -1;
    for (let i = 0; i < w.nodes.length; i++) {
       const hasTodos = w.nodes[i].todos && w.nodes[i].todos.length > 0;
       const taskHR = rowH + (w.nodes[i].ganttExpanded && hasTodos ? w.nodes[i].todos.length * 20 : 0);
       if (my >= rowStart && my <= rowStart + taskHR) {
          rowNode = w.nodes[i];
          rowIdx = i;
          break;
       }
       rowStart += taskHR;
    }

    if (!rowNode) {
      clearSelection();
      return;
    }

    if (mx >= 135 && mx <= 155 && my >= rowStart && my <= rowStart + 32 && rowNode.todos && rowNode.todos.length > 0) {
      rowNode.ganttExpanded = !rowNode.ganttExpanded;
      markUnsaved();
      renderGantt();
      return;
    }

    if (rowNode.ganttExpanded && rowNode.todos && rowNode.todos.length > 0 && my > rowStart + 32) {
      const tidx = Math.floor((my - (rowStart + 32)) / 20);
      if (tidx >= 0 && tidx < rowNode.todos.length) {
        rowNode.todos[tidx].done = !rowNode.todos[tidx].done;
        markUnsaved();
        renderGantt();
        renderGraph();
        if (selectedNodes.length === 1 && selectedNodes[0] === rowNode.id) renderTodoList(rowNode);
        return;
      }
    }

    const node = rowNode;
    const barX = 160 + node.ganttStart * pxPerDay;
    const barW = Math.max(4, node.ganttDuration * pxPerDay);
    const barY = rowStart + 4;
    const barH = rowH - 8;

    if (mx >= barX - 4 && mx <= barX + barW + 4 && my >= barY && my <= barY + barH) {
      selectSingleNode(node.id);

      if (mx >= barX - 4 && mx <= barX + 4) {
        ganttResizing = {nodeId: node.id, side: 'left'};
        ganttDragStart = mx;
        ganttDragOrigStart = node.ganttStart;
        ganttDragOrigDuration = node.ganttDuration;
      } else if (mx >= barX + barW - 4 && mx <= barX + barW + 4) {
        ganttResizing = {nodeId: node.id, side: 'right'};
        ganttDragStart = mx;
        ganttDragOrigStart = node.ganttStart;
        ganttDragOrigDuration = node.ganttDuration;
      } else {
        ganttDragging = {nodeId: node.id};
        ganttDragStart = mx;
        ganttDragOrigStart = node.ganttStart;
      }
    } else {
      clearSelection();
    }
  });

  document.addEventListener('mousemove', (e) => {
    if (!ganttDragging && !ganttResizing) return;
    const w = ws();
    const gc = w.ganttConfig;
    const body = document.getElementById('gantt-body');
    const canvas = document.getElementById('gantt-canvas');
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left + body.scrollLeft;
    const startDate = new Date(gc.startDate);
    const endDate = new Date(gc.endDate);
    const totalDays = Math.max(1, (endDate - startDate) / 86400000);
    const bw = body.clientWidth;
    const pxPerDay = (bw - 160) / totalDays * (gc.zoom || 1);
    const deltaDays = (mx - ganttDragStart) / pxPerDay;

    if (ganttDragging) {
      const node = getNodeById(ganttDragging.nodeId);
      if (node) {
        node.ganttStart = Math.max(0, Math.round(ganttDragOrigStart + deltaDays));
        renderGantt();
      }
    } else if (ganttResizing) {
      const node = getNodeById(ganttResizing.nodeId);
      if (node) {
        if (ganttResizing.side === 'left') {
          const newStart = Math.max(0, Math.round(ganttDragOrigStart + deltaDays));
          const newDuration = ganttDragOrigStart + ganttDragOrigDuration - newStart;
          if (newDuration >= 1) {
            node.ganttStart = newStart;
            node.ganttDuration = newDuration;
          }
        } else {
          const newDuration = Math.max(1, Math.round(ganttDragOrigDuration + deltaDays));
          node.ganttDuration = newDuration;
        }
        renderGantt();
      }
    }
  });

  document.addEventListener('mouseup', () => {
    if (ganttDragging || ganttResizing) {
      markUnsaved();
      saveState();
    }
    ganttDragging = null;
    ganttResizing = null;
  });
}

function setupGanttReorder() {
  const canvas = document.getElementById('gantt-canvas');
  let reorderDrag = null;

  canvas.addEventListener('mousedown', (e) => {
    const w = ws();
    const body = document.getElementById('gantt-body');
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left + body.scrollLeft;
    const my = e.clientY - rect.top + body.scrollTop;
    const headerH = 28;
    const rowH = 32;

    if (mx < 150 && mx > 0) {
      let rowStart = headerH;
      let rowIdx = -1;
      for (let i = 0; i < w.nodes.length; i++) {
        const hasTodos = w.nodes[i].todos && w.nodes[i].todos.length > 0;
        const taskHR = rowH + (w.nodes[i].ganttExpanded && hasTodos ? w.nodes[i].todos.length * 20 : 0);
        if (my >= rowStart && my <= rowStart + taskHR) {
            rowIdx = i;
            break;
        }
        rowStart += taskHR;
      }

      if (rowIdx >= 0 && rowIdx < w.nodes.length && my <= rowStart + rowH) {
        reorderDrag = {fromIdx: rowIdx, startY: my};
        e.stopPropagation();
      }
    }
  });

  document.addEventListener('mouseup', (e) => {
    if (!reorderDrag) return;
    const w = ws();
    const body = document.getElementById('gantt-body');
    const canvas = document.getElementById('gantt-canvas');
    const rect = canvas.getBoundingClientRect();
    const my = e.clientY - rect.top + body.scrollTop;
    const headerH = 28;
    const rowH = 32;

    let rowStart = headerH;
    let toIdx = w.nodes.length - 1;
    for (let i = 0; i < w.nodes.length; i++) {
      const hasTodos = w.nodes[i].todos && w.nodes[i].todos.length > 0;
      const taskHR = rowH + (w.nodes[i].ganttExpanded && hasTodos ? w.nodes[i].todos.length * 20 : 0);
      if (my >= rowStart && my <= rowStart + taskHR) {
          toIdx = i;
          break;
      }
      rowStart += taskHR;
    }
    toIdx = Math.max(0, Math.min(w.nodes.length - 1, toIdx));

    if (toIdx !== reorderDrag.fromIdx) {
      const node = w.nodes.splice(reorderDrag.fromIdx, 1)[0];
      w.nodes.splice(toIdx, 0, node);
      markUnsaved();
      renderGantt();
      renderGraph();
      saveState();
    }
    reorderDrag = null;
  });
}

function setupGanttResize() {
  const handle = document.getElementById('gantt-resize');
  const panel = document.getElementById('gantt-panel');
  let resizing = false;
  let startY = 0;
  let startH = 0;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    resizing = true;
    startY = e.clientY;
    startH = panel.offsetHeight;
  });

  document.addEventListener('mousemove', (e) => {
    if (!resizing) return;
    const delta = startY - e.clientY;
    const newH = Math.max(100, Math.min(window.innerHeight - 100, startH + delta));
    panel.style.height = newH + 'px';
    renderGantt();
  });

  document.addEventListener('mouseup', () => {
    if (resizing) {
      resizing = false;
      renderGantt();
    }
  });
}

function setupGanttToggle() {
  const btn = document.getElementById('gantt-toggle');
  const panel = document.getElementById('gantt-panel');
  const content = document.getElementById('gantt-content');

  btn.addEventListener('click', () => {
    const isCollapsed = panel.classList.contains('collapsed');
    if (isCollapsed) {
      panel.classList.remove('collapsed');
      content.style.display = 'flex';
      btn.textContent = '▼ Диаграмма Ганта ▼';
      panel.style.height = '280px';
    } else {
      panel.classList.add('collapsed');
      content.style.display = 'none';
      btn.textContent = '▲ Диаграмма Ганта ▲';
    }
    setTimeout(() => renderGantt(), 50);
  });
}

// ==================== INIT ====================
window.addEventListener('load', () => {
  init();
});

window.addEventListener('resize', () => {
  renderGraph();
  renderGantt();
});
